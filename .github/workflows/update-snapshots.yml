name: Update legacy web Playwright snapshots

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-snapshots:
    name: Refresh legacy web visual regression snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Update legacy web Playwright snapshots
        run: >-
          npx playwright test
          --config e2e/playwright.config.js
          e2e/tests/visual.pw.js
          e2e/tests/tabs.pw.js
          --project=desktop
          --project=mobile
          --update-snapshots

      - name: Commit updated snapshots
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add e2e/tests/*.pw.js-snapshots/*.png

          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
            exit 0
          fi

          git commit -m "test: update legacy web Playwright snapshots"
          git push origin HEAD:${BRANCH_NAME}
