name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Shared + mobile checks (with legacy web transition coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run shared/root tests
        run: npm test

      - name: Run mobile repo tests
        run: npm run mobile:test

      - name: Mobile typecheck
        run: npm run mobile:typecheck

      - name: Run legacy web UI tests
        run: npm run test:ui

      - name: Upload legacy Playwright test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: |
            e2e/test-results
          if-no-files-found: ignore
