name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Shared + mobile checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run shared/root tests
        run: npm test

      - name: Run shared package typechecks
        run: npm run typecheck

      - name: Run mobile repo tests
        run: npm run mobile:test

      - name: Mobile typecheck
        run: npm run mobile:typecheck
